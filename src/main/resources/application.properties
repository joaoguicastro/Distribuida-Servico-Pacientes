# =========================================
# SERVIDOR
# =========================================
server.port=8081
spring.application.name=servico-pacientes

# =========================================
# DATABASE
# =========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pacientes_db}
spring.datasource.username=${DB_USER:healthsys}
spring.datasource.password=${DB_PASS:healthsys}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000

# =========================================
# JPA
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================
# ACTUATOR
# =========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# =========================================
# LOGGING
# =========================================
logging.level.com.healthsys.pacientes=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =========================================
# RABBITMQ (CORRETO)
# =========================================
spring.rabbitmq.host=healthsys-rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest