version: '3.9'

services:

  servico-pacientes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthsys-servico-pacientes
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pacientes_db
      DB_USER: healthsys
      DB_PASS: healthsys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthsys-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  postgres:
    image: postgres:16-alpine
    container_name: healthsys-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pacientes_db
      POSTGRES_USER: healthsys
      POSTGRES_PASSWORD: healthsys
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - healthsys-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthsys -d pacientes_db"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres-data:
    driver: local

networks:
  healthsys-network:
    name: healthsys-network
    driver: bridge